              - column:
                  name: flight_hours_capacity
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
        - sql:
            sql: |
              UPDATE game_aircraft ga
              SET fuel_capacity = at.max_fuel,
                  weapons_capacity = at.max_weapons,
                  flight_hours_capacity = at.max_flight_hours
              FROM aircraft_type at
              WHERE ga.aircraft_type_id = at.aircraft_type_id;

              ALTER TABLE game_aircraft
              ADD CONSTRAINT chk_game_aircraft_fuel_capacity CHECK (fuel_capacity >= 0);

              ALTER TABLE game_aircraft
              ADD CONSTRAINT chk_game_aircraft_weapons_capacity CHECK (weapons_capacity >= 0);

              ALTER TABLE game_aircraft
              ADD CONSTRAINT chk_game_aircraft_flight_hours_capacity CHECK (flight_hours_capacity >= 0);

  - changeSet:
      id: 006-004-add-game-mission-overrides
      author: openai
      changes:
        - addColumn:
            tableName: game_mission
            columns:
              - column:
                  name: fuel_cost
