databaseChangeLog:
  - changeSet:
      id: 002-01-load-scenario
      author: openai
      changes:
        - loadData:
            tableName: scenario
            file: data/csv/scenario.csv
            relativeToChangelogFile: false
            separator: ","
            quotchar: '"'

