databaseChangeLog:
  - changeSet:
      id: 001-001-create-scenario
      author: openai
      changes:
        - createTable:
            tableName: scenario
            columns:
              - column:
                  name: scenario_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_scenario
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: scenario
            columnNames: name, version
            constraintName: uk_scenario_name_version

  - changeSet:
      id: 001-002-create-aircraft-type
      author: openai
      changes:
        - createTable:
            tableName: aircraft_type
            columns:
              - column:
                  name: aircraft_type_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_aircraft_type
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: max_fuel
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: max_weapons
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: max_flight_hours
                  type: INTEGER
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: aircraft_type
            columnNames: code
            constraintName: uk_aircraft_type_code

        - sql:
            sql: |
              ALTER TABLE aircraft_type
              ADD CONSTRAINT chk_aircraft_type_max_fuel CHECK (max_fuel > 0);

              ALTER TABLE aircraft_type
              ADD CONSTRAINT chk_aircraft_type_max_weapons CHECK (max_weapons >= 0);

              ALTER TABLE aircraft_type
              ADD CONSTRAINT chk_aircraft_type_max_flight_hours CHECK (max_flight_hours > 0);

