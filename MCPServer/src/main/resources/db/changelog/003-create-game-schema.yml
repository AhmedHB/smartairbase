databaseChangeLog:

  - changeSet:
      id: 003-001-create-game
      author: openai
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: game
      changes:
        - createTable:
            tableName: game
            columns:
              - column:
                  name: game_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game
                    nullable: false
              - column:
                  name: scenario_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
              - column:
                  name: status
                  type: VARCHAR(30)
                  constraints:
                    nullable: false
              - column:
                  name: current_round
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: started_at
                  type: TIMESTAMP
              - column:
                  name: ended_at
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: game
            baseColumnNames: scenario_id
            referencedTableName: scenario
            referencedColumnNames: scenario_id
            constraintName: fk_game_scenario
        - sql:
            sql: |
              ALTER TABLE game
              ADD CONSTRAINT chk_game_current_round CHECK (current_round >= 0);

  - changeSet:
      id: 003-002-create-game-base
      author: openai
      preConditions:
        - onFail: MARK_RAN
        - onError: HALT
        - not:
            tableExists:
              tableName: game_base
      changes:
        - createTable:
            tableName: game_base
            columns:
              - column:
                  name: game_base_id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_game_base
                    nullable: false
              - column:
                  name: game_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: code
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: base_type_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: parking_capacity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: maintenance_capacity
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: fuel_max
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: weapons_max
                  type: INTEGER
                  constraints:
                    nullable: false
              - column:
                  name: spare_parts_max
                  type: INTEGER
                  constraints:
                    nullable: false
        - addUniqueConstraint:
            tableName: game_base
            columnNames: game_id, code
            constraintName: uk_game_base_game_code
        - addForeignKeyConstraint:
            baseTableName: game_base
            baseColumnNames: game_id
            referencedTableName: game
            referencedColumnNames: game_id
            constraintName: fk_game_base_game
        - addForeignKeyConstraint:
            baseTableName: game_base
            baseColumnNames: base_type_id
            referencedTableName: base_type
            referencedColumnNames: base_type_id
            constraintName: fk_game_base_base_type
        - sql:
            sql: |
              ALTER TABLE game_base
              ADD CONSTRAINT chk_game_base_parking_capacity CHECK (parking_capacity >= 0);
              ALTER TABLE game_base
              ADD CONSTRAINT chk_game_base_maintenance_capacity CHECK (maintenance_capacity >= 0);
              ALTER TABLE game_base
              ADD CONSTRAINT chk_game_base_fuel_max CHECK (fuel_max >= 0);
              ALTER TABLE game_base
              ADD CONSTRAINT chk_game_base_weapons_max CHECK (weapons_max >= 0);
              ALTER TABLE game_base
              ADD CONSTRAINT chk_game_base_spare_parts_max CHECK (spare_parts_max >= 0);

