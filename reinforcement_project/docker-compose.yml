services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      HOSTNAME: 0.0.0.0
      PORT: ${PORT:-3000}
      TZ: ${TZ:-Europe/Stockholm}
    init: true
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./models:/app/models:ro
      - ./artifacts:/app/artifacts:ro
      - ./.fleet_web_sessions:/app/.fleet_web_sessions
      - ./config.yml:/app/config.yml:ro
      - ./generated_missions_100.json:/app/generated_missions_100.json:ro
